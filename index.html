<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>askmanu - Pitch Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Instrument Serif"', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            olive: {
              50: 'oklch(98.8% 0.003 106.5)',
              100: 'oklch(96.6% 0.005 106.5)',
              200: 'oklch(93% 0.007 106.5)',
              300: 'oklch(88% 0.011 106.6)',
              400: 'oklch(73.7% 0.021 106.9)',
              500: 'oklch(58% 0.031 107.3)',
              600: 'oklch(46.6% 0.025 107.3)',
              700: 'oklch(39.4% 0.023 107.4)',
              800: 'oklch(28.6% 0.016 107.4)',
              900: 'oklch(22.8% 0.013 107.4)',
              950: 'oklch(15.3% 0.006 107.1)',
            },
          },
        },
      },
    }
  </script>
  <style>
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .slide { display: none; }
    .slide.active { display: flex; }
    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-olive-100 text-olive-950 font-sans">

<div id="app" v-cloak>
  <!-- Progress bar -->
  <div class="fixed top-0 left-0 right-0 z-50 h-1 bg-olive-200">
    <div class="h-full bg-olive-600 transition-all duration-300" :style="{ width: ((currentSlide + 1) / slides.length * 100) + '%' }"></div>
  </div>

  <!-- Slide counter -->
  <div class="fixed bottom-6 right-8 z-50 text-sm text-olive-400 font-mono">
    {{ currentSlide + 1 }} / {{ slides.length }}
  </div>

  <!-- Navigation arrows -->
  <button @click="prev" v-show="currentSlide > 0" class="fixed left-6 top-1/2 -translate-y-1/2 z-50 w-10 h-10 rounded-full bg-olive-200 hover:bg-olive-300 flex items-center justify-center text-olive-600 transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
  </button>
  <button @click="next" v-show="currentSlide < slides.length - 1" class="fixed right-6 top-1/2 -translate-y-1/2 z-50 w-10 h-10 rounded-full bg-olive-200 hover:bg-olive-300 flex items-center justify-center text-olive-600 transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- Slides container -->
  <div v-for="(slide, index) in slides" :key="slide" class="slide min-h-screen flex-col items-center justify-center px-8" :class="{ active: index === currentSlide }">
    <div class="w-full max-w-5xl mx-auto">
      <component v-if="vueComponents[slide] && index === currentSlide" :is="vueComponents[slide]"></component>
      <div v-else v-html="slideContents[slide]"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
<script>
// ============================================================
// SLIDE CONFIGURATION
// Comment/uncomment lines to toggle slides.
// Reorder lines to change slide order.
// Supports both .html (static) and .vue (interactive) slides.
// ============================================================
const SLIDES = [
  'slides/title.html',
  'slides/team.html',
  'slides/problem.html',
  'slides/solution.html',
  'slides/how-it-works.html',
  'slides/features.html',
  'slides/roi-onboarding.vue',
  'slides/demo.html',
  'slides/case-nvidia.html',
  'slides/case-exo.html',
  'slides/cta.html',
  'slides/roi-downtime.vue',
  // --- Add customer-specific slides below ---
  // 'slides/case-study-huggingface.html',
  // 'slides/enterprise-security.html',
  // 'slides/pricing.html',
]

const { createApp } = Vue
const { loadModule } = window['vue3-sfc-loader']

const sfcOptions = {
  moduleCache: { vue: Vue },
  async getFile(url) {
    const res = await fetch(url + '?t=' + Date.now())
    if (!res.ok) throw Object.assign(new Error(url + ' ' + res.statusText), { res })
    return { getContentData: (asBinary) => asBinary ? res.arrayBuffer() : res.text() }
  },
  addStyle() {},
}

const app = createApp({
  data() {
    return {
      currentSlide: parseInt(location.hash.replace('#', '')) || 0,
      slides: SLIDES,
      slideContents: {},
      vueComponents: {},
    }
  },
  watch: {
    currentSlide(i) { location.hash = i },
  },
  async mounted() {
    // Restore slide from URL on back/forward
    window.addEventListener('hashchange', () => {
      const i = parseInt(location.hash.replace('#', '')) || 0
      if (i >= 0 && i < this.slides.length) this.currentSlide = i
    })

    // Load all slides — .html as raw text, .vue as components
    await Promise.all(
      this.slides.map(async (path) => {
        try {
          if (path.endsWith('.vue')) {
            this.vueComponents[path] = await loadModule(path, sfcOptions)
          } else {
            const res = await fetch(path + '?t=' + Date.now())
            this.slideContents[path] = await res.text()
          }
        } catch (e) {
          this.slideContents[path] = `<p class="text-red-500">Failed to load ${path}: ${e.message}</p>`
        }
      })
    )

    // Keyboard navigation
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); this.next() }
      if (e.key === 'ArrowLeft') { e.preventDefault(); this.prev() }
      if (e.key === 'Home') { e.preventDefault(); this.currentSlide = 0 }
      if (e.key === 'End') { e.preventDefault(); this.currentSlide = this.slides.length - 1 }
    })
  },
  methods: {
    next() { if (this.currentSlide < this.slides.length - 1) this.currentSlide++ },
    prev() { if (this.currentSlide > 0) this.currentSlide-- },
  },
})
app.mount('#app')
</script>

</body>
</html>
